<ion-content [fullscreen]="true" class="text-white">
  <div class="h-full min-h-full flex flex-col p-4 md:p-6 max-w-2xl mx-auto w-full relative">
    
    <div *ngIf="!isFullscreen()" class="flex items-center justify-between mb-4 md:mb-8">
      <div class="flex items-center gap-2 md:gap-3">
        <div class="w-8 h-8 md:w-10 md:h-10 bg-slate-900 rounded-xl flex items-center justify-center border border-white/5">
          <ion-icon name="videocam" class="text-base md:text-xl text-rose-500"></ion-icon>
        </div>
        <div>
          <h1 class="text-xs md:text-sm font-black tracking-widest uppercase">Cam Feed</h1>
          <p class="text-[8px] md:text-[10px] text-slate-500 uppercase font-bold tracking-widest">{{ status }}</p>
        </div>
      </div>
      <div *ngIf="isStreaming" class="flex items-center gap-2 bg-rose-600/10 border border-rose-600/20 px-2 py-1 md:px-3 md:py-1.5 rounded-full">
        <div class="w-1.5 h-1.5 bg-rose-600 rounded-full animate-pulse"></div>
        <span class="text-[8px] md:text-[10px] font-black text-rose-500 uppercase tracking-widest">On Air</span>
      </div>
    </div>

    <!-- Viewfinder -->
    <div [class.fixed]="isFullscreen()" [class.inset-0]="isFullscreen()" [class.z-50]="isFullscreen()" [class.rounded-none]="isFullscreen()"
      class="flex-1 relative bg-slate-900 rounded-2xl md:rounded-[2.5rem] overflow-hidden border border-white/5 shadow-2xl transition-all duration-500">
      
      <video #localVideo autoplay playsinline muted class="w-full h-full object-cover"></video>

      <!-- Close Button (Only in Fullscreen) -->
      <button *ngIf="isFullscreen()" (click)="toggleFullscreen(false)" 
        class="absolute top-6 right-6 w-12 h-12 bg-slate-950/80 rounded-full flex items-center justify-center text-white/40 hover:text-white transition-all shadow-xl backdrop-blur-md border border-white/10 active:scale-95 pointer-events-auto">
        <ion-icon name="close-outline" class="text-2xl"></ion-icon>
      </button>
      
      <!-- Overlays -->
      <div class="absolute inset-x-4 md:inset-x-8 top-4 md:top-8 flex justify-between pointer-events-none">
        <div class="w-3 h-3 md:w-4 md:h-4 border-t-2 border-l-2 border-white/20"></div>
        <div class="w-3 h-3 md:w-4 md:h-4 border-t-2 border-r-2 border-white/20"></div>
      </div>
      <div class="absolute inset-x-4 md:inset-x-8 bottom-4 md:bottom-8 flex justify-between pointer-events-none">
        <div class="w-3 h-3 md:w-4 md:h-4 border-b-2 border-l-2 border-white/20"></div>
        <div class="w-3 h-3 md:w-4 md:h-4 border-b-2 border-r-2 border-white/20"></div>
      </div>

      <!-- Center Crosshair -->
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-10">
        <div class="w-8 h-px bg-white"></div>
        <div class="h-8 w-px bg-white absolute"></div>
      </div>
    </div>

    <!-- Controls -->
    <div *ngIf="!isFullscreen()" class="mt-4 md:mt-8">
      <button 
        *ngIf="!isStreaming"
        (click)="startStreaming()"
        class="w-full bg-rose-600 hover:bg-rose-500 text-white font-black py-4 md:py-6 rounded-xl md:rounded-[2rem] shadow-2xl shadow-rose-600/30 transition-all active:scale-95 uppercase tracking-[0.2em] text-xs md:text-sm"
      >
        Transmit Stream
      </button>
      
      <button 
        *ngIf="isStreaming"
        class="w-full bg-slate-800 text-white/50 font-black py-4 md:py-6 rounded-xl md:rounded-[2rem] border border-white/5 uppercase tracking-[0.2em] text-xs md:text-sm"
      >
        Broadcasting...
      </button>
    </div>

    <!-- Diagnostics Overlay -->
    <div *ngIf="!isFullscreen()" class="mt-4 bg-slate-900/40 p-3 rounded-xl border border-white/5 text-[8px] font-mono opacity-60">
      <div class="flex justify-between items-center mb-1">
        <span>Signaling:</span>
        <span [class.text-emerald-500]="signalingStatus() === 'SUBSCRIBED'">{{ signalingStatus() }}</span>
      </div>
      <div class="flex justify-between items-center">
        <span>P2P Status:</span>
        <span [class.text-blue-500]="rtcStatus() === 'connected'">{{ rtcStatus() }}</span>
      </div>
    </div>

    <!-- Debug Info -->
    <div *ngIf="!isFullscreen()" class="mt-6 text-center opacity-20">
      <p class="text-[8px] font-black uppercase tracking-[0.3em]">Direct P2P Link • 720p 30fps</p>
    </div>

  </div>
</ion-content>
